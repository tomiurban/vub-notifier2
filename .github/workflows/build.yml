name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # DEBUG build sa automaticky podpíše Android debug keystore-om,
      # ktorý sa vygeneruje automaticky počas buildu. Tento podpis
      # Android telefón vždy akceptuje — žiadne "interná chyba" pri instalácii.
      # (RELEASE build by bol nepodpísaný a Android by ho odmietol.)
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Verify APK was created and is signed
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "CHYBA: APK nebol vytvorený!"
            exit 1
          fi
          echo "APK vytvorený, velkost:"
          ls -lh "$APK_PATH"
          echo "--- Kontrola podpisu ---"
          jarsigner -verify "$APK_PATH" || echo "POZOR: jarsigner nenašiel podpis (skontroluj manuálne)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VUB-Notifier-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
